name: "Tauri Build & Release"

on:
  push:
    #
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-24.04" # for Desktop linux
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install NASM
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup TCL (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Path "C:\tclbin"
          New-Item -ItemType SymbolicLink -Path "C:\tclbin\tclsh.exe" -Target "C:\Program Files\Git\usr\bin\tclsh.exe"
          echo "C:\tclbin" >> $env:GITHUB_PATH

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action replaces this with the app version
          releaseName: "Bóveda v__VERSION__"
          releaseBody: "See the assets below to download the new version of Bóveda."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
