name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  # Evita que SQLX intente conectarse a una DB real durante el compilado si usas macros
  SQLX_OFFLINE: true 


permissions:
  contents: read
  checks: write

jobs:
  # 1. Auditoría de seguridad (rápida, no requiere dependencias de sistema pesadas)
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # 2. El job "pesado" que hace todo: Lints + Tests + Coverage
  quality:
    name: Quality & Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # MAGIA: Esto ahorra un 70% del tiempo de compilación
      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Clippy (Lints)
        run: cargo clippy -- -D warnings

      - name: Run Tests
        run: cargo test --all-features --workspace


